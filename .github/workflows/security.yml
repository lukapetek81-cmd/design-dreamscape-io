name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches newly-disclosed vulns in pinned deps.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high/critical only)
        id: npm_audit
        run: |
          mkdir -p reports
          npm audit --audit-level=high --json > reports/npm-audit.json || AUDIT_EXIT=$?
          npm audit --audit-level=high > reports/npm-audit.txt || true
          exit ${AUDIT_EXIT:-0}
        continue-on-error: false

      - name: Run audit-ci (uses repo allowlist)
        if: always()
        run: |
          mkdir -p reports
          npx audit-ci --config audit-ci.json --output-format json > reports/audit-ci.json || AUDITCI_EXIT=$?
          npx audit-ci --config audit-ci.json > reports/audit-ci.txt || true
          exit ${AUDITCI_EXIT:-0}

      - name: Upload dependency scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-reports
          path: reports/
          retention-days: 30
          if-no-files-found: warn

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit, not just the diff.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fail the job on any leak finding.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
        with:
          # Emit SARIF + JSON reports for retention.
          args: detect --redact --report-format sarif --report-path gitleaks.sarif --exit-code 1
        continue-on-error: false

      - name: Generate gitleaks JSON report
        if: always()
        run: |
          mkdir -p reports
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --redact --report-format json --report-path reports/gitleaks.json || true
          /tmp/gitleaks detect --redact --report-format sarif --report-path reports/gitleaks.sarif || true

      - name: Upload gitleaks reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-reports
          path: reports/
          retention-days: 30
          if-no-files-found: warn

  codeql:
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'